# Cloud Build config — mirrors the reference work-dashboards cloudbuild.mcp.yaml.
#
# Build + push:
#   gcloud builds submit . --config=cloudbuild.yaml
# Then deploy (env vars + secrets at deploy time — see docs/RUNBOOK.md):
#   gcloud run deploy family-expenses \
#     --image=gcr.io/$PROJECT_ID/family-expenses:latest \
#     --set-env-vars=DATABASE_URL=... --set-env-vars=MCP_SECRET=...

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/family-expenses:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/family-expenses:latest'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/family-expenses:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/family-expenses:latest']

images:
  - 'gcr.io/$PROJECT_ID/family-expenses:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/family-expenses:latest'

options:
  logging: CLOUD_LOGGING_ONLY
