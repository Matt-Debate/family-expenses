# Cloud Build config — mirrors the reference work-dashboards cloudbuild.mcp.yaml.
#
# Build + push:
#   gcloud builds submit . --config=cloudbuild.yaml \
#     --substitutions=COMMIT_SHA=$(git rev-parse HEAD)
# Then deploy (env vars + secrets at deploy time — see docs/RUNBOOK.md):
#   scripts/deploy.sh

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/family-expenses:$COMMIT_SHA'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/family-expenses:$COMMIT_SHA']

images:
  - 'gcr.io/$PROJECT_ID/family-expenses:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
